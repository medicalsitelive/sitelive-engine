<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewBooster Gold Pro</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 40px 20px; }
        .gold-text { color: #FFD700; text-transform: uppercase; letter-spacing: 5px; font-weight: 900; margin: 0; }
        .status-pill { background: #111; border: 1px solid #222; padding: 8px 15px; border-radius: 50px; font-size: 10px; display: inline-block; margin-top: 20px; color: #888; }
        
        /* The Stealth Loader */
        #init-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .countdown { font-size: 48px; font-weight: 900; color: #FFD700; margin: 20px 0; }
        .stealth-msg { font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: 2px; }

        input { width: 100%; padding: 18px; margin: 25px 0; border-radius: 15px; border: 1px solid #222; background: #111; color: white; box-sizing: border-box; }
        button { background: #FFD700; color: #000; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 900; width: 100%; text-transform: uppercase; }
        button:disabled { background: #222; color: #444; }
        
        #p-bar { width: 100%; background: #111; height: 2px; margin-top: 10px; overflow: hidden; }
        #p-fill { width: 0%; background: #FFD700; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="init-overlay">
        <h1 class="gold-text">VIEWBOOSTER</h1>
        <div class="countdown" id="cd-timer">--</div>
        <p class="stealth-msg" id="stealth-status">Verifying Pro License...</p>
        <div id="p-bar" style="width: 200px;"><div id="p-fill"></div></div>
    </div>

    <div class="container">
        <h1 class="gold-text">VIEWBOOSTER GOLD PRO</h1>
        <div class="status-pill">ENGINE: LTX-VIDEO 2.3 ACTIVE</div>
        
        <input type="text" id="prompt" placeholder="Viral concept prompt...">
        <button id="gen-btn">MASTER VIDEO</button>
        <video id="output-video" style="width:100%; margin-top:20px; border-radius:15px; display:none;" controls autoplay loop></video>
    </div>

    <script type="module">
        import { LTXVideoForGenerator, AutoTokenizer } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.1";

        const timer = document.getElementById('cd-timer');
        const msg = document.getElementById('stealth-status');
        const fill = document.getElementById('p-fill');
        const overlay = document.getElementById('init-overlay');

        async function startStealthInit() {
            try {
                const model_id = 'onnx-community/LTX-Video-0.1-q4';
                
                // This starts the download but hides it behind "Optimization"
                const model = await LTXVideoForGenerator.from_pretrained(model_id, {
                    device: 'webgpu',
                    dtype: 'q4',
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            fill.style.width = p + '%';
                            timer.innerText = (100 - p); // Countdown from 100 to 0
                            
                            if (p < 30) msg.innerText = "Optimizing GPU Clusters...";
                            else if (p < 60) msg.innerText = "Syncing Gold Assets...";
                            else if (p < 90) msg.innerText = "Finalizing Pro Engine...";
                            else msg.innerText = "Ready!";
                        }
                    }
                });

                // Once done, hide the overlay
                overlay.style.display = 'none';
                window.engine = model; // Store for later
                window.tokenizer = await AutoTokenizer.from_pretrained(model_id);

            } catch (e) {
                msg.innerText = "Hardware Incompatible or Connection Error";
                timer.innerText = "!!";
            }
        }

        // Start the process immediately
        startStealthInit();

        document.getElementById('gen-btn').onclick = async () => {
            const btn = document.getElementById('gen-btn');
            btn.disabled = true;
            btn.innerText = "RENDERING...";
            
            const { video: videoBlob } = await window.engine.generate(document.getElementById('prompt').value, window.tokenizer, {
                num_frames: 16,
                width: 512,
                height: 320,
            });

            const vid = document.getElementById('output-video');
            vid.src = URL.createObjectURL(videoBlob);
            vid.style.display = 'block';
            btn.disabled = false;
            btn.innerText = "MASTER VIDEO";
        }
    </script>
</body>
</html>
