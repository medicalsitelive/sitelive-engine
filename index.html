<script type="module">
    // We import the specific LTX classes instead of the generic 'pipeline'
    import { 
        LTXVideoForGenerator, 
        AutoTokenizer, 
        AutoConfig 
    } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";

    const btn = document.getElementById('gen-btn');
    const status = document.getElementById('status');
    const fill = document.getElementById('progress-fill');
    const progText = document.getElementById('progress-text');
    const timeText = document.getElementById('time-left');
    const progCont = document.getElementById('progress-container');
    const video = document.getElementById('output-video');

    let startTime;

    if (navigator.gpu) {
        status.innerHTML = "<span style='color: #28a745;'>●</span> LTX System Ready";
        btn.disabled = false;
    }

    btn.onclick = async () => {
        const userPrompt = document.getElementById('prompt').value || "A cinematic shot of Nairobi";
        btn.disabled = true;
        progCont.style.display = 'block';
        startTime = Date.now();

        try {
            const model_id = 'onnx-community/LTX-Video-0.1-q4';
            
            // 1. Load the Model directly (fixes the "Unsupported Pipeline" error)
            const model = await LTXVideoForGenerator.from_pretrained(model_id, {
                device: 'webgpu',
                dtype: 'q4',
                progress_callback: (data) => {
                    if (data.status === 'progress') {
                        const p = data.progress;
                        fill.style.width = p.toFixed(2) + '%';
                        progText.innerText = `Compressing: ${p.toFixed(2)}%`;
                        
                        // Time estimation logic
                        const elapsed = (Date.now() - startTime) / 1000;
                        const remaining = (elapsed / p * 100) - elapsed;
                        const mins = Math.floor(remaining / 60);
                        const secs = Math.floor(remaining % 60);
                        timeText.innerText = p > 1 ? `${mins}m ${secs}s left` : "Calculating...";
                    }
                }
            });

            const tokenizer = await AutoTokenizer.from_pretrained(model_id);
            
            progText.innerText = "LTX is dreaming...";
            timeText.innerText = "Generating pixels...";

            // 2. Generate the video
            const { video: videoBlob } = await model.generate(userPrompt, tokenizer, {
                num_frames: 16,
                width: 512,
                height: 320,
            });

            video.src = URL.createObjectURL(videoBlob);
            video.style.display = 'block';
            progCont.style.display = 'none';
            btn.disabled = false;
            status.innerText = "✅ Video Ready!";

        } catch (err) {
            console.error(err);
            // This catches specific WebGPU memory errors
            status.innerHTML = `<span style='color:red;'>Error: ${err.message.split('at')[0]}</span>`;
            btn.disabled = false;
        }
    };
</script>
