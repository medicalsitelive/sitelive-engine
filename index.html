<script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";

    const btn = document.getElementById('gen-btn');
    const status = document.getElementById('status');
    const fill = document.getElementById('progress-fill');
    const progText = document.getElementById('progress-text');
    const progCont = document.getElementById('progress-container');
    const video = document.getElementById('output-video');

    if (navigator.gpu) {
        status.innerText = "✅ System Ready (LTX Engine)";
        btn.disabled = false;
    }

    btn.onclick = async () => {
        const userPrompt = document.getElementById('prompt').value || "Cinematic shot of a sunset";
        btn.disabled = true;
        progCont.style.display = 'block';

        // 🚀 SWITCHING TO LTX-VIDEO 2.3 (Quantized for WebGPU)
        const generator = await pipeline('text-to-video', 'onnx-community/LTX-Video-0.1-q4', {
            device: 'webgpu',
            dtype: 'q4', // This is the compression that makes it fast!
            progress_callback: (data) => {
                if (data.status === 'progress') {
                    const p = Math.round(data.progress);
                    fill.style.width = p + '%';
                    progText.innerText = `Compressing LTX Engine: ${p}%`;
                }
            }
        });

        progText.innerText = "LTX is dreaming up your video...";
        const result = await generator(userPrompt, {
            num_frames: 16, // Keeps it fast for mobile
            width: 512,
            height: 320
        });
        
        video.src = URL.createObjectURL(result.video);
        video.style.display = 'block';
        progCont.style.display = 'none';
        btn.disabled = false;
    };
</script>
