<script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";

    const btn = document.getElementById('gen-btn');
    const status = document.getElementById('status');
    const fill = document.getElementById('progress-fill');
    const progText = document.getElementById('progress-text');
    const progCont = document.getElementById('progress-container');
    const video = document.getElementById('output-video');

    let currentDisplayProgress = 0;

    // This function makes the number "race" smoothly
    function updateDisplay(target) {
        const step = () => {
            if (currentDisplayProgress < target) {
                currentDisplayProgress += 0.35; // The "Speed" of the counter
                if (currentDisplayProgress > target) currentDisplayProgress = target;
                
                fill.style.width = currentDisplayProgress + '%';
                progText.innerHTML = `Compressing LTX Engine: <span style="color:#007bff; font-weight:bold;">${currentDisplayProgress.toFixed(2)}%</span>`;
                requestAnimationFrame(step);
            }
        };
        requestAnimationFrame(step);
    }

    if (navigator.gpu) {
        status.innerText = "✅ LTX System Ready";
        btn.disabled = false;
    }

    btn.onclick = async () => {
        const userPrompt = document.getElementById('prompt').value || "Cinematic medical drone shot";
        btn.disabled = true;
        progCont.style.display = 'block';
        currentDisplayProgress = 0;

        const generator = await pipeline('text-to-video', 'onnx-community/LTX-Video-0.1-q4', {
            device: 'webgpu',
            dtype: 'q4', 
            progress_callback: (data) => {
                if (data.status === 'progress') {
                    // We send the real progress to our "Fast Counter"
                    updateDisplay(data.progress);
                }
            }
        });

        progText.innerText = "LTX is dreaming up your video...";
        const result = await generator(userPrompt, {
            num_frames: 16,
            width: 512,
            height: 320
        });
        
        video.src = URL.createObjectURL(result.video);
        video.style.display = 'block';
        progCont.style.display = 'none';
        btn.disabled = false;
    };
</script>
